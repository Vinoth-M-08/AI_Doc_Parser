server:
  port: 8080

spring:
  application:
    name: doc-migration-tool
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

logging:
  level:
    com.migration.tool: DEBUG

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash-lite
  endpoint: https://generativelanguage.googleapis.com/v1beta/models
  enabled: true
  max-input-chars: 30000
  timeout-seconds: 60
  available-models:
    - gemini-2.5-flash-lite
    - gemini-2.5-flash
    - gemini-2.5-pro
    - gemini-2.0-flash-lite
    - gemini-2.0-flash
    - gemini-flash-latest
